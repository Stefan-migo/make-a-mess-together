<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>phone-sensor-orchestra — p5 Sketch</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0a0a;
    }
    canvas { display: block; }
    #start-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      color: #e0e0e0;
      font-family: 'Courier New', monospace;
      font-size: 1.5rem;
      cursor: pointer;
      z-index: 10;
      user-select: none;
    }
    #start-overlay:hover {
      color: #ffffff;
      text-shadow: 0 0 8px rgba(37, 99, 235, 0.5);
    }
  </style>
</head>
<body>
  <!-- p5.js 2.x (P2D renderer — paint buffer uses P2D, not WEBGL) -->
  <script src="https://unpkg.com/p5@2.2.3/lib/p5.min.js"></script>

  <!-- Core config -->
  <script src="config.js"></script>
  <script src="sensor-mapper.js"></script>

  <!-- Brush canvas system (single visual mode) -->
  <script src="brush-registry.js"></script>
  <script src="brush-canvas.js"></script>

  <script src="device-manager.js"></script>
  <script src="sketch.js"></script>
</body>
</html>
